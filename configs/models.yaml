# Entity Resolution POC — LOCKED MODEL LIST
# Locked: March 2026
# 5 models total. No others. Do not add without updating this lock.

# ─── BASELINES ───────────────────────────────────────────────────────────────

bm25_baseline:
  type: bm25
  library: rank_bm25
  params_m: 0
  dims: null
  license: apache2
  role: baseline
  eval_mode: zero_shot
  notes: "Lexical baseline. k1=1.5, b=0.75."

# ─── ZERO-SHOT ONLY (no fine-tuning) ─────────────────────────────────────────

minilm_l6:
  hf_id: sentence-transformers/all-MiniLM-L6-v2
  params_m: 22
  dims: [384]
  license: apache2
  mrl_native: false
  role: floor_baseline
  eval_mode: both
  query_prefix: null
  doc_prefix: null
  pooling: mean
  notes: "Absolute floor. Shows off-the-shelf small models fail at entity resolution. Zero-shot only."

pplx_embed_v1_06b:
  hf_id: perplexity-ai/pplx-embed-v1-0.6b
  params_m: 600
  dims: [1536, 768, 256, 128, 64]
  license: apache2
  mrl_native: true
  role: sota_ceiling
  eval_mode: both
  architecture: decoder_only_qwen25
  query_prefix: "query_system_prompt"  # uses separate system prompt for queries
  doc_prefix: "doc_system_prompt"      # uses separate system prompt for docs
  pooling: eos_token
  mteb_retrieval_ndcg10: 62.41
  mteb_overall: 70.0
  context_length: 32768
  released: "2026-03-06"
  paper: "https://research.perplexity.ai/articles/pplx-embed-state-of-the-art-embedding-models-for-web-scale-retrieval"
  notes: "SOTA <1B as of Mar 2026. #1 MTEB Retrieval <1B. Zero-shot only on M3 Pro. Decoder-only, EOS token pooling. SEPARATE system prompts for query vs doc — eval harness must handle this. Cosine similarity."

# ─── FINE-TUNE TARGETS ────────────────────────────────────────────────────────

bge_small:
  hf_id: BAAI/bge-small-en-v1.5
  params_m: 33
  dims: [384, 256, 128, 64]
  license: mit
  mrl_native: false  # add via MatryoshkaLoss during fine-tuning
  role: efficiency_story
  eval_mode: both  # zero-shot + fine-tuned
  query_prefix: null
  doc_prefix: null
  pooling: cls
  notes: "MIT license. 33M params. The narrative model — proves training data beats model size. Add MRL via MatryoshkaLoss(MNRL, dims=[384,256,128,64]) during fine-tune."

gte_modernbert_base:
  hf_id: Alibaba-NLP/gte-modernbert-base
  params_m: 149
  dims: [768, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  role: primary_result
  eval_mode: both  # zero-shot + fine-tuned
  query_prefix: null
  doc_prefix: null
  pooling: cls
  mteb_retrieval_ndcg10: 66.4
  released: "2025-01"
  notes: "PRIMARY fine-tune target. Best MTEB/param 2025. ModernBERT backbone — RoPE, Flash Attention. MRL native. Strong short-text retrieval."

nomic_v15:
  hf_id: nomic-ai/nomic-embed-text-v1.5
  params_m: 137
  dims: [768, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  role: mrl_reference
  eval_mode: both  # zero-shot + fine-tuned
  query_prefix: "search_query"   # REQUIRED at inference
  doc_prefix: "search_document"  # REQUIRED at inference
  pooling: mean
  mteb_retrieval_ndcg10: 62.3
  notes: "MRL baked in from training. CRITICAL: must prepend 'search_query: ' to queries and 'search_document: ' to docs at inference. Dropping prefix loses 3-5% recall. Eval harness must handle."

# ─── FINE-TUNING CONFIG ───────────────────────────────────────────────────────

finetune_targets:
  - bge_small
  - gte_modernbert_base
  - nomic_v15
  - pplx_embed_v1_06b
  - minilm_l6

zero_shot_only: []

serialization_formats:
  - pipe    # "Jay Shah | Acme Corp | jay@acme.com | USA"
  - kv      # "fn:Jay ln:Shah org:Acme Corp em:jay@acme.com co:USA"

matryoshka_dims_finetune: [768, 512, 256, 128, 64]  # for gte/nomic
matryoshka_dims_bge: [384, 256, 128, 64]             # for bge-small
