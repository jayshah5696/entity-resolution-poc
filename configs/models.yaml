# Model Registry for Entity Resolution POC
# All models are Apache 2.0 or MIT licensed (open weights, commercial-friendly)
# Last updated: 2025-03 based on research sweep

# ─── BASELINES ───────────────────────────────────────────────────────────────

bm25_baseline:
  type: bm25
  library: rank_bm25
  params_m: 0
  dims: null
  license: apache2
  mrl_native: false
  notes: "Lexical baseline. k1=1.5, b=0.75. Fails on typos and partial fields."

# ─── TIER 1: PRIMARY CANDIDATES (MRL-native, strong retrieval) ───────────────

nomic_v15:
  hf_id: nomic-ai/nomic-embed-text-v1.5
  dims: [768, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  params_m: 137
  mteb_avg: 62.3
  released: "2024-02"
  notes: "MRL baked into training (not bolted on). Gold standard for open Apache MRL models. use 'search_query:' prefix at query time."

gte_modernbert_base:
  hf_id: Alibaba-NLP/gte-modernbert-base
  dims: [768, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  params_m: 149
  mteb_avg: 66.4
  released: "2025-01"
  notes: "NEW Jan 2025. ModernBERT backbone — RoPE, Flash Attention, 8192 ctx. Best MTEB/param tradeoff in 2025. Top pick for structured entity records. Strong short-text retrieval."

nomic_v2_moe:
  hf_id: nomic-ai/nomic-embed-text-v2-moe
  dims: [768, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  params_m: 475  # total; ~137M active (8-expert MoE)
  params_active_m: 137
  mteb_avg: 63.0
  released: "2025-Q1"
  notes: "NEW 2025. Mixture of Experts — fast inference despite large param count. Upgrade from v1.5. Good general semantic match. MRL supported."

arctic_embed_m_v15:
  hf_id: Snowflake/snowflake-arctic-embed-m-v1.5
  dims: [768, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  params_m: 109
  mteb_avg: 64.6
  released: "2024-Q4"
  notes: "MRL is a core design feature, not afterthought. Built for efficient retrieval pipelines. Excellent at dimension compression without recall drop. Strong for structured record matching."

mxbai_large_v1:
  hf_id: mixedbread-ai/mxbai-embed-large-v1
  dims: [1024, 512, 256, 128, 64]
  license: apache2
  mrl_native: true
  params_m: 335
  mteb_avg: 64.7
  released: "2024-Q1"
  notes: "Largest model in roster. Highest raw MTEB. MRL trained. Trade-off: 335M params means slower encode. Use as quality ceiling reference."

# ─── TIER 2: EFFICIENT SMALL MODELS ─────────────────────────────────────────

bge_small:
  hf_id: BAAI/bge-small-en-v1.5
  dims: [384, 256, 128, 64]
  license: mit
  mrl_native: false
  params_m: 33
  mteb_avg: 62.0  # approximate
  released: "2024-Q1"
  notes: "Smallest production-grade model. MIT license. No MRL native — apply MatryoshkaLoss during fine-tuning to add MRL capability. Best efficiency story for 500M scale."

bge_base:
  hf_id: BAAI/bge-base-en-v1.5
  dims: [768, 512, 256, 128, 64]
  license: mit
  mrl_native: false
  params_m: 109
  mteb_avg: 64.3
  released: "2024-Q1"
  notes: "MIT license. Solid retrieval baseline. No MRL native — add via fine-tuning."

minilm_l6:
  hf_id: sentence-transformers/all-MiniLM-L6-v2
  dims: [384, 256, 128]
  license: apache2
  mrl_native: false
  params_m: 22
  mteb_avg: 56.3  # approximate
  released: "2021"
  notes: "Tiny. Fast. Weak on entity resolution tasks out of the box — include only as a floor baseline to show why fine-tuning matters."

granite_embed_125m:
  hf_id: ibm-granite/granite-embedding-125m-english
  dims: [768]
  license: apache2
  mrl_native: false
  params_m: 125
  mteb_avg: 61.0  # estimated
  released: "2025-Q1"
  notes: "NEW 2025. IBM Granite embedding series. No MRL native. Enterprise-grade quality control. Solid mid-size option. Also available: granite-embedding-30m-english (MIT, 30M params)."

granite_embed_30m:
  hf_id: ibm-granite/granite-embedding-30m-english
  dims: [768]
  license: mit
  mrl_native: false
  params_m: 30
  mteb_avg: 58.0  # estimated
  released: "2025-Q1"
  notes: "MIT license. Smallest credible model in roster. Use as ultra-low-resource ablation point."

# ─── EXCLUDED MODELS (documented for transparency) ───────────────────────────

# jina-embeddings-v3:
#   hf_id: jinaai/jina-embeddings-v3
#   params_m: 570, dims: 1024, MRL: yes
#   EXCLUDED: CC BY-NC 4.0 license — not commercial-friendly
#
# perplexity-ai (embedding):
#   EXCLUDED: No open-source embedding model released as of 2025-03.
#   Their HuggingFace org only has r1-1776 (a DeepSeek-R1 reasoning LM fine-tune, MIT).
#   Embedding endpoint in their Sonar API is proprietary/closed. No open weights. No public specs.
#
# ColBERTv2:
#   EXCLUDED from retrieval: token-level storage at 500M records = ~500TB. Re-ranker only.
#
# SPLADE v2:
#   EXCLUDED from primary eval: 30K-dim sparse inverted index at 500M records is impractical on M3 Pro POC.

# ─── FINE-TUNED VARIANTS (generated during experiments) ──────────────────────

# These are created by the fine-tuning pipeline and saved to models/finetuned/
# Naming convention: {base_model_key}_ft_{serialization_format}
# e.g., nomic_v15_ft_pipe, gte_modernbert_base_ft_kv, bge_small_ft_pipe

finetuned_variants:
  base_models_to_finetune:
    - gte_modernbert_base   # Primary: best 2025 model
    - nomic_v15             # Primary: MRL reference
    - bge_small             # Efficiency story (33M params)
  serialization_formats:
    - pipe    # "Jay Shah | Acme Corp | jay@acme.com | USA"
    - kv      # "fn:Jay ln:Shah org:Acme Corp em:jay@acme.com co:USA"
  matryoshka_dims: [768, 512, 256, 128, 64]
